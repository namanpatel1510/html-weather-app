<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/token.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <title>Weather Dashboard UI</title>
</head>

<body>

    <main class="weather-card">
        <section class="panel">
            <div class="hero-content">
                <h1>Monday</h1>
                <p class="date">20 Jun 2022</p>
                <div class="location">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 2c-3.866 0-7 3.134-7 7 0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" fill="currentColor"/>
                    </svg>
                    Biarritz, FR
                </div>
            </div>

            <div class="hero-content temp-display">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="5" fill="currentColor" />
                    <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="12" y1="1" x2="12" y2="4" />
                        <line x1="12" y1="20" x2="12" y2="23" />
                        <line x1="1" y1="12" x2="4" y2="12" />
                        <line x1="20" y1="12" x2="23" y2="12" />
                        <line x1="4.2" y1="4.2" x2="6.3" y2="6.3" />
                        <line x1="17.7" y1="17.7" x2="19.8" y2="19.8" />
                        <line x1="4.2" y1="19.8" x2="6.3" y2="17.7" />
                        <line x1="17.7" y1="6.3" x2="19.8" y2="4.2" />
                    </g>
                </svg>
                <span class="degrees">29 °C</span>
                <span class="condition">Sunny</span>
            </div>
        </section>

        <section class="details-panel">
            <div class="weather-stats">
                <div class="stat-line">
                    <span>Precipitation</span>
                    <span>0%</span>
                </div>
                <div class="stat-line">
                    <span>Humidity</span>
                    <span>42%</span>
                </div>
                <div class="stat-line">
                    <span>Wind</span>
                    <span>3 km/h</span>
                </div>
            </div>

            <div class="forecast-grid">
                <div class="forecast-item active">
                    <svg class="icon forecast-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="5" fill="currentColor" />
                        <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="12" y1="1" x2="12" y2="4" />
                            <line x1="12" y1="20" x2="12" y2="23" />
                            <line x1="1" y1="12" x2="4" y2="12" />
                            <line x1="20" y1="12" x2="23" y2="12" />
                            <line x1="4.2" y1="4.2" x2="6.3" y2="6.3" />
                            <line x1="17.7" y1="17.7" x2="19.8" y2="19.8" />
                            <line x1="4.2" y1="19.8" x2="6.3" y2="17.7" />
                            <line x1="17.7" y1="6.3" x2="19.8" y2="4.2" />
                        </g>
                    </svg>
                    <span class="day">Tue</span>
                    <span class="high">30 °C</span>
                </div>
                <div class="forecast-item">
                    <svg class="icon forecast-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 14a4 4 0 0 1 0-8 4 4 0 0 1 3.9 3H11a4 4 0 0 1 0 8H6z" fill="currentColor" />
                        <path d="M8 18l1.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M12 18l1.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M16 18l1.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span class="day">Wed</span>
                    <span class="high">22 °C</span>
                </div>
                <div class="forecast-item">
                    <svg class="icon forecast-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 14a4 4 0 0 1 0-8 4 4 0 0 1 3.9 3H11a4 4 0 0 1 0 8H6z" fill="currentColor" />
                        <path d="M8 19v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M12 19v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M16 19v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span class="day">Thu</span>
                    <span class="high">06 °C</span>
                </div>
                <div class="forecast-item">
                    <svg class="icon forecast-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="5" fill="currentColor" />
                        <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="12" y1="1" x2="12" y2="4" />
                            <line x1="12" y1="20" x2="12" y2="23" />
                            <line x1="1" y1="12" x2="4" y2="12" />
                            <line x1="20" y1="12" x2="23" y2="12" />
                            <line x1="4.2" y1="4.2" x2="6.3" y2="6.3" />
                            <line x1="17.7" y1="17.7" x2="19.8" y2="19.8" />
                            <line x1="4.2" y1="19.8" x2="6.3" y2="17.7" />
                            <line x1="17.7" y1="6.3" x2="19.8" y2="4.2" />
                        </g>
                    </svg>
                    <span class="day">Fri</span>
                    <span class="high">26 °C</span>
                </div>
            </div>

            <div class="sun-details">
                <div class="sun-card sunrise-card">
                    <svg class="icon sunrise-icon" viewBox="0 0 64 64" aria-hidden="true">
                        <path d="M32 16a12 12 0 0 1 12 12h6a18 18 0 0 0-36 0h6a12 12 0 0 1 12-12z" fill="none" stroke="currentColor" stroke-width="4" />
                        <path d="M32 36v14" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M16 42h32" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M32 6v8" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M20 10l4 6" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M44 10l-4 6" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                    </svg>
                    <div>
                        <span class="label">Sunrise</span>
                        <span class="time">06:14 AM</span>
                    </div>
                </div>
                <div class="sun-card sunset-card">
                    <svg class="icon sunset-icon" viewBox="0 0 64 64" aria-hidden="true">
                        <path d="M16 38h32" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M32 38v10" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M24 46h16" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M16 30a16 16 0 0 1 32 0" fill="none" stroke="currentColor" stroke-width="4" />
                        <path d="M32 46v10" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M12 22l8 4" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                        <path d="M52 22l-8 4" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                    </svg>
                    <div>
                        <span class="label">Sunset</span>
                        <span class="time">08:42 PM</span>
                    </div>
                </div>
            </div>

            <button class="location-btn">
                New York City
            </button>
        </section>
    </main>

</body>

</html>
